<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Rosa chqui2.obj</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; color: #fff; }
        #info { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #444; border-radius: 8px; pointer-events: none; }
        #video_debug { position: absolute; bottom: 20px; right: 20px; width: 200px; border-radius: 8px; transform: scaleX(-1); border: 1px solid #444; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="info"><h3>CARGANDO ROSA...</h3><p>Asegúrate de tener chqui2.obj en la misma carpeta.</p></div>
    <video id="video_debug" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

        // --- CONFIGURACIÓN DE ESCENA ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Iluminación Contrapicado
        const light = new THREE.SpotLight(0xffffff, 100);
        light.position.set(0, -2, 5);
        light.castShadow = true;
        light.angle = 0.3;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        // Pared de fondo para sombras
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        wall.position.z = -5;
        wall.receiveShadow = true;
        scene.add(wall);

        // --- CARGA DEL OBJETO chqui2.obj ---
        let rosaPrincipal = null;
        const loader = new OBJLoader();
        
        loader.load('chqui2.obj', (obj) => {
            rosaPrincipal = obj;
            
            // Aplicar el material Mesh Metálico a todas las partes del objeto
            const meshMaterial = new THREE.MeshStandardMaterial({
                color: 0xaaaaaa,
                wireframe: true, // Esto crea el efecto visual de malla
                metalness: 1,
                roughness: 0.2
            });

            obj.traverse((child) => {
                if (child.isMesh) {
                    child.material = meshMaterial;
                    child.castShadow = true;
                }
            });

            obj.position.set(0, 0, 0);
            scene.add(obj);
            document.getElementById('info').innerHTML = "<h3>SISTEMA LISTO</h3><p>Usa tus manos frente a la cámara.</p>";
        }, 
        (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% cargado'); },
        (error) => { document.getElementById('info').innerHTML = "<h3>ERROR</h3><p>No se encontró chqui2.obj</p>"; }
        );

        // --- LÓGICA DE MEDIAPIPE ---
        window.targetSize = 1;
        window.targetIntensity = 100;
        window.targetColor = new THREE.Color(0xffffff);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                const h1 = results.multiHandLandmarks[0][9];
                const h2 = results.multiHandLandmarks[1][9];
                
                // Apertura de manos -> Tamaño
                const dist = Math.hypot(h1.x - h2.x, h1.y - h2.y);
                window.targetSize = 0.5 + (dist * 2);

                // Mano Derecha (Y) -> Intensidad luz
                window.targetIntensity = (1.0 - h1.y) * 500;

                // Mano Izquierda (Y) -> Color (Hacia Rojo Pastel)
                const hue = (1.0 - h2.y);
                window.targetColor.setHSL(0, hue, 0.8); 
            }
        });

        const videoElement = document.getElementById('video_debug');
        const cameraPipe = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraPipe.start();

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            if (rosaPrincipal) {
                // Suavizado de movimientos
                const s = window.targetSize;
                rosaPrincipal.scale.lerp(new THREE.Vector3(s, s, s), 0.1);
                rosaPrincipal.rotation.y += 0.005;

                // Actualizar Luz
                light.intensity += (window.targetIntensity - light.intensity) * 0.1;
                light.color.lerp(window.targetColor, 0.1);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

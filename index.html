<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Fix Producción</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #00ff88; }
        #gui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #333; }
        button { padding: 15px 30px; background: #00ff88; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #v { position: absolute; bottom: 10px; right: 10px; width: 120px; transform: scaleX(-1); border: 1px solid #333; opacity: 0.5; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="gui">
        <h2 style="margin-top:0">XUŽU - SISTEMA VISUAL</h2>
        <button id="btn">ACTIVAR CÁMARA</button>
        <div id="status" style="margin-top:10px; font-size:12px; color:#fff;">Esperando...</div>
    </div>

    <video id="v" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        // --- 1. MOTOR 3D (Siempre arranca) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 50);
        light.position.set(0, 3, 3);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Objeto de prueba (por si el OBJ falla)
        const fallbackGeo = new THREE.BoxGeometry(1, 1, 1);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, wireframe: true });
        let visualObj = new THREE.Mesh(fallbackGeo, fallbackMat);
        scene.add(visualObj);

        // --- 2. CARGA DEL OBJ (Independiente) ---
        const loader = new OBJLoader();
        loader.load('./chqui2.obj', 
            (obj) => {
                status.innerText = "Rosa chqui2.obj cargada.";
                scene.remove(visualObj); // Quitamos el cubo
                
                let geo;
                obj.traverse(c => { if(c.isMesh) geo = c.geometry; });
                
                // Aplicamos el material de malla que querías
                const mat = new THREE.MeshStandardMaterial({ color: 0x00ff88, wireframe: true, metalness: 1 });
                visualObj = new THREE.InstancedMesh(geo, mat, 30);
                
                const dummy = new THREE.Object3D();
                for(let i=0; i<30; i++) {
                    dummy.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*5, (Math.random()-0.5)*10);
                    dummy.scale.set(180, 180, 180); // Escala para tus coords micro
                    dummy.updateMatrix();
                    visualObj.setMatrix(i, dummy.matrix);
                }
                scene.add(visualObj);
            },
            undefined,
            (err) => {
                status.innerHTML = "<b style='color:red'>Archivo no encontrado.</b> Usando cubo de reserva.";
            }
        );

        // --- 3. CÁMARA (Solo con clic) ---
        async function start() {
            btn.innerText = "INICIANDO...";
            try {
                const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
                
                const video = document.getElementById('v');
                const cam = new Camera(video, {
                    onFrame: async () => { await hands.send({image: video}); },
                    width: 640, height: 480
                });

                hands.onResults(res => {
                    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                        const h = res.multiHandLandmarks[0][9];
                        light.intensity = (1.0 - h.y) * 200; // La mano controla la luz
                    }
                });

                await cam.start();
                document.getElementById('gui').style.opacity = "0.2";
                animate();
            } catch (e) {
                alert("Error cámara: " + e.message);
            }
        }

        btn.onclick = start;

        function animate() {
            requestAnimationFrame(animate);
            if(visualObj) visualObj.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

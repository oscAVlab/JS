<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Producción</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #00ff88; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; 
        }
        button { 
            padding: 20px 40px; font-size: 1.2rem; background: #00ff88; color: #000; 
            border: none; cursor: pointer; border-radius: 50px; font-weight: bold;
        }
        #status { margin-top: 20px; font-size: 14px; text-align: center; max-width: 80%; }
        #video_debug { 
            position: absolute; bottom: 10px; left: 10px; width: 120px; 
            border: 1px solid #333; transform: scaleX(-1); z-index: 50; 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>JARDÍN SECRETO</h1>
        <button id="startBtn">ENTRAR AL JARDÍN</button>
        <div id="status">Esperando interacción...</div>
    </div>

    <video id="video_debug" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');

        // --- 1. SETUP ESCENA ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.1);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 0.5, 3); // Vista Macro

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 0);
        light.position.set(0, -1, 2);
        scene.add(light);

        // --- 2. CARGA DE OBJETO ---
        let instancedMesh;
        const count = 80;
        const loader = new OBJLoader();

        function loadRose() {
            status.innerText = "Buscando chqui2.obj en el servidor...";
            
            loader.load('./chqui2.obj', (obj) => {
                let geo;
                obj.traverse(c => { if(c.isMesh) geo = c.geometry; });
                
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0xaaaaaa, wireframe: true, metalness: 1 
                });

                instancedMesh = new THREE.InstancedMesh(geo, mat, count);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < count; i++) {
                    dummy.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*4, (Math.random()-0.5)*6);
                    dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    const s = 150 + Math.random() * 100; // Escala para tus coords micro
                    dummy.scale.set(s, s, s);
                    dummy.updateMatrix();
                    instancedMesh.setMatrix(i, dummy.matrix);
                }
                scene.add(instancedMesh);
                status.innerText = "Rosa cargada. Listo para iniciar cámara.";
            }, 
            undefined, 
            (err) => {
                status.innerHTML = "<b style='color:red'>ERROR:</b> No encontré 'chqui2.obj'.<br>Asegúrate de que el nombre sea idéntico en GitHub.";
            });
        }

        loadRose();

        // --- 3. INTERACCIÓN Y CÁMARA ---
        window.targetInt = 0;
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });
        
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const h = res.multiHandLandmarks[0][9];
                window.targetInt = (1.0 - h.y) * 300;
            }
        });

        startBtn.onclick = () => {
            status.innerText = "Iniciando cámara...";
            const video = document.getElementById('video_debug');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });
            
            cam.start()
                .then(() => {
                    overlay.style.display = 'none';
                })
                .catch(e => {
                    status.innerHTML = "<b style='color:red'>ERROR DE CÁMARA:</b> Bloqueado por el navegador o sin permisos.";
                });
        };

        function animate() {
            requestAnimationFrame(animate);
            light.intensity += (window.targetInt - light.intensity) * 0.1;
            if(instancedMesh) instancedMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

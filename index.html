<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Debug Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #00ff88; font-family: monospace; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 25px 50px; font-size: 20px; background: #00ff88; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 10px; }
        #log { margin-top: 20px; color: white; font-size: 12px; text-align: center; padding: 0 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="overlay">
    <button id="btnEntrar">CARGANDO...</button>
    <div id="log">Iniciando sistema...</div>
</div>

<video id="v" style="display:none" playsinline></video>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

    const btn = document.getElementById('btnEntrar');
    const log = document.getElementById('log');

    // --- 1. TEST DE SEGURIDAD ---
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        alert("ERROR: Debes usar HTTPS para activar la cámara en GitHub.");
    }

    // --- 2. ESCENA ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const pointLight = new THREE.PointLight(0xffffff, 100);
    pointLight.position.set(0, 5, 5);
    scene.add(pointLight);

    // --- 3. CARGA DE OBJETO ---
    let roses;
    const loader = new OBJLoader();
    
    log.innerText = "Buscando chqui2.obj...";
    
    loader.load('chqui2.obj', 
        (obj) => {
            log.innerText = "Rosa cargada. Toca el botón verde.";
            btn.innerText = "ENTRAR AL JARDÍN";
            btn.style.background = "#00ff88";
            
            let geo;
            obj.traverse(c => { if(c.isMesh) geo = c.geometry; });
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ff88, wireframe: true });
            
            roses = new THREE.InstancedMesh(geo, mat, 50);
            const dummy = new THREE.Object3D();
            for(let i=0; i<50; i++){
                dummy.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                const s = 150; 
                dummy.scale.set(s,s,s);
                dummy.updateMatrix();
                roses.setMatrix(i, dummy.matrix);
            }
            scene.add(roses);
        },
        undefined,
        (err) => {
            log.innerHTML = "<b style='color:red'>ERROR: chqui2.obj no encontrado.</b><br>Asegúrate que el archivo se llame exactamente así.";
            console.error(err);
        }
    );

    // --- 4. CÁMARA Y PERMISOS ---
    async function startApp() {
        log.innerText = "Solicitando cámara...";
        try {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });
            
            const video = document.getElementById('v');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });

            await cam.start();
            document.getElementById('overlay').style.display = 'none';
            animate();
        } catch (e) {
            alert("Error al iniciar cámara: " + e.message);
            log.innerText = "Fallo: " + e.message;
        }
    }

    btn.addEventListener('click', () => {
        if(btn.innerText === "ENTRAR AL JARDÍN") {
            startApp();
        } else {
            alert("Espera a que la rosa cargue...");
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if(roses) roses.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

</script>
</body>
</html>

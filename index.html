<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Debug Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; color: #fff; }
        #info { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #ff0055; border-radius: 8px; pointer-events: none; max-width: 300px; }
        #video_debug { position: absolute; bottom: 20px; right: 20px; width: 150px; border-radius: 8px; transform: scaleX(-1); border: 1px solid #444; opacity: 0.5; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>
    <div id="info"><h3>ESTADO DEL SISTEMA</h3><p id="status">Iniciando motor...</p></div>
    <video id="video_debug" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

        const statusLabel = document.getElementById('status');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 50);
        light.position.set(0, 2, 2);
        scene.add(light);

        // --- CARGA DE OBJETO CON FALLBACK ---
        const loader = new OBJLoader();
        let instancedMesh;
        const count = 100;

        statusLabel.innerText = "Buscando chqui2.obj...";

        loader.load('chqui2.obj', 
            (obj) => {
                // EXITO: Cargó tu rosa
                let geo;
                obj.traverse(c => { if(c.isMesh) geo = c.geometry; });
                initInstancing(geo, true);
                statusLabel.innerText = "Rosa chqui2.obj cargada con éxito.";
            },
            (xhr) => {
                statusLabel.innerText = "Cargando: " + Math.round((xhr.loaded / xhr.total * 100)) + "%";
            },
            (err) => {
                // FALLO: Usamos un cubo para no dejarte a oscuras
                console.error("No se pudo cargar el OBJ. Usando fallback.");
                statusLabel.innerHTML = "<b style='color:yellow'>AVISO:</b> No encontré 'chqui2.obj'.<br>Usando cubos de prueba.";
                initInstancing(new THREE.BoxGeometry(0.1, 0.1, 0.1), false);
            }
        );

        function initInstancing(geometry, isRealObj) {
            const mat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, wireframe: true, metalness: 1 });
            instancedMesh = new THREE.InstancedMesh(geometry, mat, count);
            const dummy = new THREE.Object3D();
            
            for (let i = 0; i < count; i++) {
                dummy.position.set((Math.random()-0.5)*10, Math.random()*5, (Math.random()-0.5)*10);
                dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                // Si es tu OBJ (que es micro), escalamos mucho. Si es el cubo, poco.
                const s = isRealObj ? 150 : 1; 
                dummy.scale.set(s, s, s);
                dummy.updateMatrix();
                instancedMesh.setMatrix(i, dummy.matrix);
            }
            scene.add(instancedMesh);
        }

        // --- MEDIAPIPE ---
        window.targetInt = 50;
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const h = res.multiHandLandmarks[0][9];
                window.targetInt = (1.0 - h.y) * 200;
            }
        });

        const video = document.getElementById('video_debug');
        const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); } });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            light.intensity += (window.targetInt - light.intensity) * 0.1;
            if(instancedMesh) instancedMesh.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

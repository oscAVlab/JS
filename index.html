<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Malla Real + MediaPipe</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: monospace; color: #ccc; }
        #info { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #444; border-radius: 8px; 
            pointer-events: none;
        }
        #video_debug {
            position: absolute; bottom: 20px; right: 20px; width: 240px; 
            border-radius: 8px; transform: scaleX(-1); z-index: 10; border: 2px solid #444;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="info"><h3>INICIALIZANDO...</h3></div>
    <video id="video_debug" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('video_debug');
        const infoDiv = document.getElementById('info');
        
        window.targetIntensity = 0.5;
        window.targetColorSat = 0.0;
        window.targetAperture = 0.2;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                let handA = results.multiHandLandmarks[0][9];
                let handB = results.multiHandLandmarks[1][9];

                let leftHandOnScreen, rightHandOnScreen;
                if (handA.x < handB.x) { leftHandOnScreen = handA; rightHandOnScreen = handB; } 
                else { leftHandOnScreen = handB; rightHandOnScreen = handA; }

                const rawDist = Math.hypot(leftHandOnScreen.x - rightHandOnScreen.x, leftHandOnScreen.y - rightHandOnScreen.y);
                window.targetAperture = Math.max(0, Math.min(1, (rawDist - 0.15) / 0.45));
                window.targetIntensity = Math.max(0, Math.min(1, 1.0 - rightHandOnScreen.y));
                window.targetColorSat = Math.max(0, Math.min(1, 1.0 - leftHandOnScreen.y));

                infoDiv.innerHTML = `
                    <h3>SISTEMA ACTIVO</h3>
                    Izquierda (Intensidad): ${Math.round(window.targetIntensity * 100)}%<br>
                    Derecha (Color Pastel): ${Math.round(window.targetColorSat * 100)}%<br>
                    Apertura (Ángulo Luz): ${Math.round(window.targetAperture * 100)}%
                `;
            } else {
                infoDiv.innerHTML = `<h3>BUSCANDO 2 MANOS...</h3>`;
            }
        });

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start();
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.04);

        const cam3D = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        cam3D.position.set(0, 4, 12); cam3D.lookAt(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves de alta calidad
        document.body.appendChild(renderer.domElement);

        // 1. Entorno (Paredes)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 20), wallMat);
        backWall.position.set(0, 10, -6); backWall.receiveShadow = true; scene.add(backWall);

        // 2. GENERADOR DE TEXTURA DE MALLA METÁLICA PERFORADA
        function createMeshTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; // Resolución del patrón
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Fondo Blanco (Metal Sólido)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 128, 128);

            // Agujeros Negros (Transparencia)
            ctx.fillStyle = '#000000';
            const radius = 24; // Tamaño del agujero
            const spacing = 64; // Distancia entre agujeros

            for (let x = 0; x <= 128; x += spacing) {
                for (let y = 0; y <= 128; y += spacing) {
                    // Círculos alineados
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    // Círculos intercalados (patrón hexagonal de malla)
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y + spacing/2, radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(8, 8); // Qué tan densa es la malla
            return texture;
        }

        const meshAlphaMap = createMeshTexture();

        // Material con AlphaTest (Crucial para las sombras perforadas)
        const plantMat = new THREE.MeshStandardMaterial({ 
            color: 0x999999, 
            metalness: 1.0, 
            roughness: 0.3,
            alphaMap: meshAlphaMap,
            alphaTest: 0.4, // Todo lo negro en la textura se vuelve 100% transparente
            side: THREE.DoubleSide // Se renderiza por dentro y por fuera
        });

        // 3. Geometría (Forma de Oreja de Conejo)
        const plantGroup = new THREE.Group();
        const leafGeo = new THREE.SphereGeometry(1, 64, 64);
        
        // Creamos 5 hojas y las deformamos
        for(let i=0; i<5; i++) {
            const leaf = new THREE.Mesh(leafGeo, plantMat);
            // Deformación: Achatadas (Z), altas (Y), anchura media (X)
            leaf.scale.set(0.8, 2.5, 0.15); 
            // Posicionamiento en círculo apuntando hacia afuera
            const angle = (i / 5) * Math.PI * 2;
            leaf.position.x = Math.cos(angle) * 0.5;
            leaf.position.z = Math.sin(angle) * 0.5;
            leaf.position.y = 2.5;
            leaf.rotation.y = -angle;
            leaf.rotation.x = 0.2; // Inclinación hacia afuera
            leaf.castShadow = true;
            plantGroup.add(leaf);
        }
        scene.add(plantGroup);

        // 4. Iluminación (Contrapicado)
        scene.add(new THREE.AmbientLight(0x080808));

        const spotLight = new THREE.SpotLight(0xffffff, 0); 
        spotLight.position.set(0, -1, 3); // Abajo y adelante
        spotLight.target = plantGroup;
        spotLight.angle = 0.2; 
        spotLight.penumbra = 0.3; // Bordes de sombra más duros
        spotLight.decay = 1.5;
        spotLight.distance = 50;
        spotLight.castShadow = true;
        // Sombra en altísima resolución para captar los agujeritos de la malla
        spotLight.shadow.mapSize.width = 4096; 
        spotLight.shadow.mapSize.height = 4096;
        spotLight.shadow.bias = -0.0001; // Evita artefactos visuales
        scene.add(spotLight);

        // 5. Animación e Interpolación
        let currentInt = 0.5, currentSat = 0.0, currentAper = 0.2;
        const colorFrio = new THREE.Color(0x556677); 
        const colorRojoPastel = new THREE.Color(0xff8888); 

        function animate() {
            requestAnimationFrame(animate);

            // Pequeño movimiento orgánico
            plantGroup.rotation.y += 0.002; 
            
            // Respiración de las hojas
            const time = Date.now() * 0.001;
            plantGroup.children.forEach((leaf, index) => {
                leaf.rotation.x = 0.2 + Math.sin(time + index) * 0.05;
            });

            // Suavizado (Lerp) de MediaPipe
            currentInt += (window.targetIntensity - currentInt) * 0.1;
            currentSat += (window.targetColorSat - currentSat) * 0.1;
            currentAper += (window.targetAperture - currentAper) * 0.1;

            // Mapeo
            spotLight.intensity = 50 + (currentInt * 2500); // Mucha más intensidad máxima
            spotLight.color.lerpColors(colorFrio, colorRojoPastel, currentSat);
            spotLight.angle = 0.15 + (currentAper * 0.6); 
            scene.fog.density = 0.02 + (currentAper * 0.05);

            renderer.render(scene, cam3D);
        }
        animate();

        window.addEventListener('resize', () => {
            cam3D.aspect = window.innerWidth / window.innerHeight;
            cam3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

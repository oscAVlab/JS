<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto - Contrapicado + MediaPipe</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: monospace;
            color: #ccc;
        }
        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            line-height: 1.5;
        }
        #video_debug {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            border-radius: 8px;
            transform: scaleX(-1); /* Efecto espejo */
            z-index: 10;
            border: 2px solid #444;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="info">
        <h3>INICIALIZANDO...</h3>
        Espera a que cargue el modelo.
    </div>
    
    <video id="video_debug" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('video_debug');
        const infoDiv = document.getElementById('info');
        
        // Variables globales (Targets para el 3D) de 0 a 1
        window.targetScale = 0.5;    // Mano Izquierda
        window.targetHue = 0.5;      // Mano Derecha
        window.targetAperture = 0.2; // Distancia (Abrir/Cerrar)

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                // Obtenemos la muñeca (Landmark 0) de las dos manos detectadas
                let handA = results.multiHandLandmarks[0][0];
                let handB = results.multiHandLandmarks[1][0];

                let leftHandOnScreen, rightHandOnScreen;
                
                // Ordenamos por X para saber cuál está a cada lado
                if (handA.x < handB.x) {
                    leftHandOnScreen = handA;
                    rightHandOnScreen = handB;
                } else {
                    leftHandOnScreen = handB;
                    rightHandOnScreen = handA;
                }

                // CÁLCULO 1: Distancia (Abrir/Cerrar Manos) -> Apertura de luz
                const dx = leftHandOnScreen.x - rightHandOnScreen.x;
                const dy = leftHandOnScreen.y - rightHandOnScreen.y;
                let rawDistance = Math.sqrt(dx * dx + dy * dy);
                window.targetAperture = Math.max(0, Math.min(1, (rawDistance - 0.1) / 0.6));

                // CÁLCULO 2 y 3: Alturas individuales (Invertimos Y para que arriba sea 1)
                // Por el efecto espejo:
                // La mano derecha en pantalla es tu MANO IZQUIERDA física (Tamaño)
                window.targetScale = Math.max(0, Math.min(1, 1.0 - rightHandOnScreen.y));
                
                // La mano izquierda en pantalla es tu MANO DERECHA física (Color)
                window.targetHue = Math.max(0, Math.min(1, 1.0 - leftHandOnScreen.y));

                infoDiv.innerHTML = `
                    <h3>SISTEMA ACTIVO</h3>
                    Mano Izq (Tamaño): ${Math.round(window.targetScale * 100)}%<br>
                    Mano Der (Color): ${Math.round(window.targetHue * 100)}%<br>
                    Apertura Manos (Luz): ${Math.round(window.targetAperture * 100)}%
                `;
            } else {
                infoDiv.innerHTML = `<h3>BUSCANDO MANOS...</h3><br>Levanta ambas manos frente a la cámara.`;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // 1. Setup Base
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.04);

        const cam3D = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        cam3D.position.set(0, 3, 12);
        cam3D.lookAt(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. Entorno (Paredes)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 20), wallMat);
        backWall.position.set(0, 10, -6);
        backWall.receiveShadow = true;
        scene.add(backWall);

        // 3. Geometría Metálica (Planta)
        const plantGeo = new THREE.TorusKnotGeometry(1.5, 0.4, 250, 32, 4, 7);
        const plantMat = new THREE.MeshStandardMaterial({ 
            color: 0xaaaaaa, wireframe: true, metalness: 1, roughness: 0.1 
        });
        const plant = new THREE.Mesh(plantGeo, plantMat);
        plant.position.set(0, 3, 0);
        plant.castShadow = true;
        scene.add(plant);

        // 4. Iluminación (Contrapicado)
        scene.add(new THREE.AmbientLight(0x111111)); // Muy oscura

        const spotLight = new THREE.SpotLight(0xffaa00, 800); // Ámbar inicial
        spotLight.position.set(0, -2, 4); // Ubicada ABAJO y adelante
        spotLight.target = plant; // Apunta directo a la planta
        spotLight.angle = 0.2; // Cerrada inicialmente
        spotLight.penumbra = 0.5;
        spotLight.decay = 1.5;
        spotLight.distance = 50;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        scene.add(spotLight);

        // 5. Animación e Interpolación (Lerp)
        let currentScale = 0.5;
        let currentHue = 0.5;
        let currentAperture = 0.2;

        function animate() {
            requestAnimationFrame(animate);

            // Rotación base de la planta
            plant.rotation.y += 0.003;
            plant.rotation.x += 0.001;

            // Suavizado de datos (Glide/Portamento)
            currentScale += (window.targetScale - currentScale) * 0.1;
            currentHue += (window.targetHue - currentHue) * 0.1;
            currentAperture += (window.targetAperture - currentAperture) * 0.1;

            // MAPEO 1: Mano Izquierda -> Escala (Tamaño) de la planta
            // Mapeamos de 1x (mínimo) a 2.5x (máximo)
            const scaleValue = 1 + (currentScale * 1.5);
            plant.scale.set(scaleValue, scaleValue, scaleValue);
            
            // Ajustamos la altura Y para que no atraviese el piso al crecer
            plant.position.y = 3 + (currentScale * 1.5);

            // MAPEO 2: Mano Derecha -> Tono de Color (Hue)
            // HSL en Threejs: Hue va de 0 a 1. 
            // 0.08 es Naranja/Ámbar, 0.5 es Cian.
            const hueValue = 0.08 + (currentHue * 0.42);
            spotLight.color.setHSL(hueValue, 1.0, 0.5);

            // MAPEO 3: Abrir Manos -> Ángulo de Luz y Niebla
            spotLight.angle = 0.1 + (currentAperture * 0.7); // Abre el cono
            scene.fog.density = 0.02 + (currentAperture * 0.05); // Aumenta la densidad de niebla

            renderer.render(scene, cam3D);
        }

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            cam3D.aspect = window.innerWidth / window.innerHeight;
            cam3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

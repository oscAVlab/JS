<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jardín Secreto - Giroscopio Móvil</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: monospace;
            color: #ccc;
            touch-action: none; /* Evita el scroll nativo en el canvas */
        }
        
        /* Pantalla de inicio obligatoria para pedir permisos en móviles */
        #start_overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start_btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            background-color: #333;
            color: #fff;
            border: 1px solid #888;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    
    <div id="start_overlay">
        <button id="start_btn">Entrar al Jardín</button>
        <p style="margin-top: 20px; color: #666; text-align: center; max-width: 80%;">
            Sube el volumen y permite el acceso a los sensores de movimiento.
        </p>
    </div>

    <div id="info">Esperando giroscopio...</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // 1. Configuración de Three.js (Similar al de escritorio)
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.04);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 12);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Geometrías
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), wallMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 15), wallMaterial);
        backWall.position.set(0, 7.5, -5);
        backWall.receiveShadow = true;
        scene.add(backWall);

        const plantGeo = new THREE.TorusKnotGeometry(2, 0.6, 200, 32, 3, 5);
        const plantMat = new THREE.MeshStandardMaterial({ color: 0x888888, wireframe: true, metalness: 1, roughness: 0.2 });
        const plant = new THREE.Mesh(plantGeo, plantMat);
        plant.position.set(0, 3, 0);
        plant.castShadow = true;
        scene.add(plant);

        // Luces
        scene.add(new THREE.AmbientLight(0x222222));
        const spotLight = new THREE.SpotLight(0xffaa00, 500);
        spotLight.position.set(0, 10, 8);
        spotLight.angle = 0.3;
        spotLight.penumbra = 0.2;
        spotLight.decay = 2;
        spotLight.distance = 40;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024; // Optimizado para móvil
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        // 2. Lógica del Giroscopio (DeviceOrientation)
        let targetTiltY = 0.5; // De 0 a 1
        let targetTiltX = 0.5; // De 0 a 1
        const infoDiv = document.getElementById('info');

        const btn = document.getElementById('start_btn');
        btn.addEventListener('click', async () => {
            // Ocultar pantalla de inicio
            document.getElementById('start_overlay').style.display = 'none';

            // Solicitar permisos (Requerido en iOS 13+)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        infoDiv.innerHTML = "Permiso de sensores denegado.";
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Android o navegadores sin restricción explícita
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });

        function handleOrientation(event) {
            // event.beta: Inclinación adelante/atrás (Típicamente -180 a 180)
            // event.gamma: Inclinación izquierda/derecha (Típicamente -90 a 90)
            
            let beta = event.beta || 0;
            let gamma = event.gamma || 0;

            // CLAMPING: Limitamos los ángulos a un rango físico cómodo para las muñecas
            // Asumimos que sostienes el móvil frente a ti. 
            // 0º es plano sobre la mesa, 90º es totalmente vertical.
            beta = Math.max(10, Math.min(80, beta)); 
            
            // -40º a 40º para girar como un volante de lado a lado
            gamma = Math.max(-40, Math.min(40, gamma));

            // NORMALIZACIÓN: Convertimos esos rangos a un valor de 0 a 1
            targetTiltY = (beta - 10) / 70; 
            targetTiltX = (gamma + 40) / 80;

            infoDiv.innerHTML = `Sensores Activos<br>Y (Adelante/Atrás): ${Math.round(targetTiltY * 100)}%<br>X (Izquierda/Derecha): ${Math.round(targetTiltX * 100)}%`;
        }

        // 3. Animación y Ruteo (Lerp)
        let currentTiltY = 0.5;
        let currentTiltX = 0.5;
        const colorCentro = new THREE.Color(0xffaa00); // Ámbar
        const colorLado = new THREE.Color(0x00ffff);   // Cian

        function animate() {
            requestAnimationFrame(animate);

            plant.rotation.y += 0.005;
            plant.rotation.x += 0.002;

            // Interpolación (Glide) para evitar saltos bruscos
            currentTiltY += (targetTiltY - currentTiltY) * 0.05;
            currentTiltX += (targetTiltX - currentTiltX) * 0.05;

            // MAPEO EJE Y (beta) -> Apertura de luz y altura de planta
            spotLight.angle = 0.1 + (currentTiltY * 0.8);
            plant.position.y = 2 + (currentTiltY * 3);

            // MAPEO EJE X (gamma) -> Color. 
            // Usamos un valor absoluto desde el centro (0.5) para que cambie de color 
            // tanto si inclinas a la izquierda como a la derecha
            let colorMix = Math.abs(currentTiltX - 0.5) * 2; 
            spotLight.color.lerpColors(colorCentro, colorLado, colorMix);

            renderer.render(scene, camera);
        }

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
